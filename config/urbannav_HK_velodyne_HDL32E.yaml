ros_topic:
  lidar: "/velodyne_points"
  imu: "/imu/data"

param_acc_value_scale: 1.0

param_lidar_type: "LIDAR_TYPE_urbannav_new_velodyne_HDL32E"
param_detect_range: 200.0
param_detect_blind: 1.0

flg_extrinsic_bwtween_l_i_use_rot: true
