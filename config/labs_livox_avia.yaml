cam_dist_coeffs_vec: [-0.1080, 0.1050, -1.2872e-04, 5.7923e-05, -0.0222]
cam_width: 1280
cam_height: 1024

flg_extrinsic_bwtween_l_c_use_rot: true
extrinsic_rot_l_c:
