ros_topic:
  lidar: /livox/lidar
  imu: /livox/imu
  camera: /camera/image_color/compressed

camera:
  enable_colorize: true

output:
  save_keyframe_pcd: true
  save_rgb_keyframe_pcd: false
  save_pcd_dir: /home/apple-pie/SLAM/fr-lio/codes/frlio/log/pcd
  save_pcd_stride: 5

flg_cam_need_resize: false
flg_cam_need_undistort: false
flg_cam_need_equalize: false
flg_cam_rgb_or_bgr_or_gray: 0

cam_intrinsic_mat:
